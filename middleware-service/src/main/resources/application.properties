spring.application.name=middleware-service-habitar-inmobiliaria
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.config.import=optional:file:.env[.properties]
server.port=8080
wasi.api.url=https://api.wasi.co/v1
wasi.id.company=${WASI_ID_COMPANY}
wasi.token=${WASI_TOKEN}
hubspot.token=${HUBSPOT_TOKEN}
hubspot.files.parent-folder-id=209809979043
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.api-docs.path=/v3/api-docs

springdoc.swagger-ui.operations-sorter=method

logging.level.root=INFO

logging.level.com.habitar.middleware=DEBUG
logging.level.co.habitarinmobiliaria.middleware_service=DEBUG
logging.level.co.habitarinmobiliaria.middleware_service.client=DEBUG
logging.level.com.habitar.middleware.client=DEBUG

# Feign defaults
spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=5000

# Wasi — API de terceros más lento, readTimeout extendido
spring.cloud.openfeign.client.config.wasi-client.connectTimeout=3000
spring.cloud.openfeign.client.config.wasi-client.readTimeout=8000

# HubSpot
spring.cloud.openfeign.client.config.hubspot-client.connectTimeout=3000
spring.cloud.openfeign.client.config.hubspot-client.readTimeout=5000

# Airtable
spring.cloud.openfeign.client.config.airtable-client.connectTimeout=3000
spring.cloud.openfeign.client.config.airtable-client.readTimeout=5000

spring.cloud.openfeign.okhttp.enabled=true

asesor.n.id=${ASESOR_N_ID}
asesor.n.foto=${ASESOR_N_FOTO}
asesor.n.tel=${ASESOR_N_TEL}
asesor.n.meet=${ASESOR_N_MEET}

asesor.s.id=${ASESOR_S_ID}
asesor.s.foto=${ASESOR_S_FOTO}
asesor.s.tel=${ASESOR_S_TEL}
asesor.s.meet=${ASESOR_S_MEET}

asesor.j.id=${ASESOR_J_ID}
asesor.j.foto=${ASESOR_J_FOTO}
asesor.j.tel=${ASESOR_J_TEL}
asesor.j.meet=${ASESOR_J_MEET}

asesor.d.id=${ASESOR_D_ID}
asesor.d.foto=${ASESOR_D_FOTO}
asesor.d.tel=${ASESOR_D_TEL}
asesor.d.meet=${ASESOR_D_MEET}

asesor.m.id=${ASESOR_M_ID}
asesor.m.foto=${ASESOR_M_FOTO}
asesor.m.tel=${ASESOR_M_TEL}
asesor.m.meet=${ASESOR_M_MEET}

asesor.a.id=${ASESOR_A_ID}
asesor.a.foto=${ASESOR_A_FOTO}
asesor.a.tel=${ASESOR_A_TEL}
asesor.a.meet=${ASESOR_A_MEET}

asesor.js.id=${ASESOR_JS_ID}
asesor.js.foto=${ASESOR_JS_FOTO}
asesor.js.tel=${ASESOR_JS_TEL}
asesor.js.meet=${ASESOR_JS_MEET}


airtable.url=https://api.airtable.com/v0/${AIRTABLE_BASE_ID:appDefault}


airtable.token=${AIRTABLE_TOKEN}
airtable.table.inmuebles=Inmuebles_Privados

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logtail.sourceToken=${BETTERSTACK_SOURCE_TOKEN}
