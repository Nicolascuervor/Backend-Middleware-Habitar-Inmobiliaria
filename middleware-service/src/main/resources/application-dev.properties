springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
cors.allowed-origins=http://localhost:8000,http://localhost:3000,http://localhost:5173,http://localhost:4200,https://*.loca.lt,https://*.lhr.life,https://*.trycloudflare.com,https://*.hubspot.com
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect