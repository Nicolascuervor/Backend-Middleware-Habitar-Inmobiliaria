springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
cors.allowed-origins=http://localhost:8000,http://localhost:3000,http://localhost:5173,http://localhost:4200,https://*.loca.lt,https://*.lhr.life,https://*.trycloudflare.com,https://*.hubspot.com
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${SUPABASE_DB_HOST:localhost}:${SUPABASE_DB_PORT:6543}/${SUPABASE_DB_NAME:postgres}?sslmode=require}
spring.datasource.username=${DATABASE_USERNAME:${SUPABASE_DB_USER:postgres}}
spring.datasource.password=${DATABASE_PASSWORD:${SUPABASE_DB_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect