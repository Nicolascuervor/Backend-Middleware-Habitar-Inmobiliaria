springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://${SUPABASE_DB_HOST:localhost}:${SUPABASE_DB_PORT:6543}/${SUPABASE_DB_NAME:postgres}?sslmode=require}
spring.datasource.username=${DATABASE_USERNAME:${SUPABASE_DB_USER:postgres}}
spring.datasource.password=${DATABASE_PASSWORD:${SUPABASE_DB_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect